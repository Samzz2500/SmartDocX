{% extends "base.html" %}
{% block title %}Change Password — SmartDocX{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow border border-gray-100 dark:border-gray-700 p-8">
    <h2 class="text-xl font-extrabold text-gray-900 dark:text-white mb-6">🔑 Change Password</h2>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-200 mb-1.5">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}"
               class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 focus:ring-2 focus:ring-indigo-500 text-sm transition"
               {% if field.field.required %}required{% endif %}>
        {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors|striptags }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition">
        Update Password
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{% url 'settings' %}" class="text-sm text-gray-400 hover:text-indigo-600 transition">← Back to Settings</a>
    </div>
  </div>
</div>
{% endblock %}
